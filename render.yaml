services:
  - type: web
    name: the-pulse-project
    env: 
    buildCommand: "./build.sh"
    startCommand: "gunicorn the_pulse.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "theplus.uk,www.theplus.uk"
      - key: DATABASE_URL
        fromDatabase:
          name: the-pulse-db
          property: connectionString
databases:
  - name: the-pulse-db
    databaseName: the_pulse
    plan: free
